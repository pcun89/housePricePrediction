<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <!-- HERO SECTION -->
    <header class="hero">
        <h1>🏠 House Price Predictor</h1>
        <p>Real-time ML predictions powered by Google Cloud Run</p>
        <button onclick="scrollToApp()">Try It Now</button>
    </header>

    <!-- INFO SECTION -->
    <section class="info">
        <div class="card">
            <h2>⚡ Fast API</h2>
            <p>Deployed using FastAPI on Google Cloud Run</p>
        </div>
        <div class="card">
            <h2>🧠 Machine Learning</h2>
            <p>Linear regression with feature scaling</p>
        </div>
        <div class="card">
            <h2>🌐 Full Stack</h2>
            <p>Frontend + backend + cloud integration</p>
        </div>
    </section>

    <!-- APP -->
    <section id="app" class="app">
        <h2>Run Prediction</h2>

        <div id="featureInputs" class="grid"></div>

        <div class="buttons">
            <button id="predictBtn">Predict</button>
            <button id="exampleBtn">Fill Example</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div id="predictionBox" class="prediction">
            — no prediction yet —
        </div>
    </section>

    <script>
        const featureNames = [
            "MedInc", "HouseAge", "AveRooms", "AveBedrms",
            "Population", "AveOccup", "Latitude", "Longitude"
        ];

        const featureInputsDiv = document.getElementById('featureInputs');
        const predictionBox = document.getElementById('predictionBox');

        function buildInputs() {
            featureNames.forEach((name, i) => {
                const div = document.createElement('div');

                const label = document.createElement('label');
                label.textContent = name;

                const input = document.createElement('input');
                input.type = "number";
                input.step = "any";

                div.appendChild(label);
                div.appendChild(input);
                featureInputsDiv.appendChild(div);
            });
        }

        function readValues() {
            const inputs = document.querySelectorAll("#featureInputs input");
            return Array.from(inputs).map(i => Number(i.value));
        }

        async function doPredict() {
            try {
                const values = readValues();

                const res = await fetch(
                    "https://house-api-816554231079.us-central1.run.app/predict",
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ values })
                    }
                );

                const data = await res.json();
                const price = data.prediction * 100000;

                predictionBox.textContent =
                    `Estimated Price: $${price.toLocaleString()}`;

            } catch (e) {
                predictionBox.textContent = "Error: " + e.message;
            }
        }

        document.getElementById("predictBtn").onclick = doPredict;

        document.getElementById("exampleBtn").onclick = () => {
            const example = [8, 20, 6, 1, 3000, 3, 34, -118];
            document.querySelectorAll("#featureInputs input")
                .forEach((inp, i) => inp.value = example[i]);
        };

        document.getElementById("resetBtn").onclick = () => {
            document.querySelectorAll("#featureInputs input")
                .forEach(inp => inp.value = "");
            predictionBox.textContent = "— no prediction yet —";
        };

        function scrollToApp() {
            document.getElementById("app").scrollIntoView({ behavior: "smooth" });
        }

        buildInputs();
    </script>

</body>

</html>
